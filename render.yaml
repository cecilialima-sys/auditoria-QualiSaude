services:
  - type: web
    name: qualisaude-hospitalar
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && npx prisma generate && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        value: https://muznilpevhyhmyyjenvv.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://muznilpevhyhmyyjenvv.supabase.co
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: REPORTS_DIR
        value: /opt/render/project/src/data/reports
      - key: AUDIT_REPORT_STORE_PATH
        value: /opt/render/project/src/data/audit-report-store.json
      - key: MAX_UPLOAD_MB
        value: "10"
